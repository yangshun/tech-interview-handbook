# Workspace validation using Vite+
name: Check

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '25.8.1'
          cache: true
      - name: Installation
        run: vp install
      - name: Check
        run: vp check
      - name: Test
        run: vp test
